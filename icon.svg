    <!-- Heart inside pin (pink) -->
    <g transform="translate(0, -42) scale(0.6)">
      <path d="M 0 25 C -30 -25 -90 -25 -90 25 C -90 70 -40 95 0 140 C 40 95 90 70 90 25 C 90 -25 30 -25 0 25 Z" fill="#e75480"/>
    </g>
