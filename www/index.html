<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mapa našich spomienok ❤️</title>
<meta name="application-name" content="Naša mapa">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Naša mapa">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#e8a0b4">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root {
  --rose: #fce4ec;
  --rose-light: #fff0f3;
  --rose-deep: #e8a0b4;
  --rose-dark: #d4798f;
  --gold: #c98a5b;
  --gold-light: #e8c4a0;
  --amber: #f0d5c0;
  --text: #4a3034;
  --text-light: #8a6b70;
  --bg: #fff8f5;
  --card: #ffffff;
  --heart: #e75480;
  --heart-light: rgba(231,84,128,0.15);
  --shadow: rgba(232,160,180,0.25);
  --shadow-strong: rgba(232,160,180,0.4);
  --radius: 16px;
  --radius-sm: 10px;
  --transition: 0.4s cubic-bezier(0.34,1.56,0.64,1);
  --font-display: 'Playfair Display', serif;
  --font-body: 'Inter',-apple-system,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);overflow:hidden;height:100vh;width:100vw;-webkit-tap-highlight-color:transparent}
#hero{position:fixed;inset:0;z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#fce4ec 0%,#fff0f3 30%,#fff3e0 70%,#fce4ec 100%);transition:opacity .8s ease,transform .8s ease}
#hero.hidden{opacity:0;transform:scale(1.05);pointer-events:none}
.hearts-bg{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.heart-particle{position:absolute;bottom:-40px;font-size:20px;opacity:0;animation:floatHeart 8s ease-in infinite;pointer-events:none}
@keyframes floatHeart{0%{transform:translateY(0) rotate(0deg) scale(.5);opacity:0}10%{opacity:.8}90%{opacity:.6}100%{transform:translateY(-100vh) rotate(20deg) scale(1.2);opacity:0}}
.hero-content{text-align:center;z-index:2;padding:2rem;opacity:0;animation:heroFadeIn 1.2s ease forwards}
@keyframes heroFadeIn{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.hero-heart{font-size:4rem;margin-bottom:.5rem;display:block;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
.hero-title{font-family:var(--font-display);font-size:clamp(2rem,6vw,4rem);font-weight:700;color:var(--text);margin-bottom:.75rem;letter-spacing:-.02em;line-height:1.2}
.hero-title .accent{color:var(--heart);font-style:italic}
.hero-subtitle{font-size:clamp(.95rem,2.5vw,1.25rem);font-weight:300;color:var(--text-light);max-width:480px;margin:0 auto 2.5rem;line-height:1.7;font-style:italic}
.hero-btn{display:inline-flex;align-items:center;gap:.75rem;padding:1rem 2.5rem;border:none;border-radius:50px;background:linear-gradient(135deg,var(--rose-deep),var(--rose-dark));color:#fff;font-size:1.05rem;font-family:var(--font-body);font-weight:500;cursor:pointer;transition:all var(--transition);box-shadow:0 4px 20px var(--shadow);letter-spacing:.02em}
.hero-btn:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 8px 30px var(--shadow-strong)}
.hero-btn:active{transform:scale(.97)}
#app{display:none;height:100vh;width:100vw;flex-direction:column;opacity:0;transition:opacity .6s ease}
#app.visible{display:flex;opacity:1}
.top-bar{padding:.75rem .75rem .5rem;background:rgba(255,248,245,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid rgba(232,160,180,.15);z-index:10;flex-shrink:0}
.top-bar-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:.35rem}
.app-title{font-family:var(--font-display);font-size:1.1rem;font-weight:600;color:var(--text);line-height:1}
.app-title .heart-inline{color:var(--heart)}
.app-title .sub{font-size:.65rem;font-weight:400;color:var(--text-light);display:block;font-family:var(--font-body);font-style:italic;margin-top:2px}
.top-actions{display:flex;align-items:center;gap:6px}
.view-toggle{display:flex;gap:4px;background:var(--rose);padding:4px;border-radius:12px}
.view-btn{padding:.35rem .75rem;border:none;border-radius:9px;font-size:.78rem;font-family:var(--font-body);font-weight:500;cursor:pointer;transition:all .25s ease;background:transparent;color:var(--text-light);display:flex;align-items:center;gap:4px}
.view-btn.active{background:#fff;color:var(--text);box-shadow:0 2px 8px var(--shadow)}
.view-btn svg{width:15px;height:15px;fill:currentColor}
.stats{display:flex;gap:1rem;justify-content:center;margin-bottom:.25rem}
.stat-item{text-align:center;min-width:0;background:var(--rose-light);padding:.25rem .65rem;border-radius:10px;transition:all .3s ease}
.stat-item:hover{transform:translateY(-1px);box-shadow:0 2px 8px var(--shadow)}
.stat-number{font-family:var(--font-display);font-size:1.1rem;font-weight:700;color:var(--rose-dark);line-height:1.2}
.stat-label{font-size:.58rem;color:var(--text-light);text-transform:uppercase;letter-spacing:.08em;font-weight:600}
.counter-bar{text-align:center;padding:.4rem .75rem;margin:.15rem .5rem 0;font-family:var(--font-display);font-size:.85rem;color:var(--text-light);line-height:1.4;background:rgba(255,255,255,.5);border-radius:12px;border:1px solid rgba(232,160,180,.15);position:relative;overflow:hidden}
.counter-bar .counter-hearts{position:absolute;left:0;right:0;top:0;bottom:0;display:flex;align-items:center;justify-content:space-around;font-size:1.4rem;opacity:.08;pointer-events:none;user-select:none;letter-spacing:1rem;overflow:hidden}
.counter-bar .counter-text{position:relative;z-index:1}
.counter-bar strong{color:var(--rose-dark);font-style:normal;font-weight:700}
.counter-bar .counter-icon{font-size:1rem;margin-right:4px}
.main-content{flex:1;position:relative;overflow:hidden}
.view-panel{position:absolute;inset:0;transition:opacity .4s ease,transform .4s ease;overflow:hidden}
.view-panel.hidden{opacity:0;transform:scale(.96);pointer-events:none}
#map{width:100%;height:100%;z-index:1}
.heart-marker{display:flex;align-items:center;justify-content:center;transition:transform .3s ease}
.heart-marker:hover{transform:scale(1.2);z-index:1000!important}
.heart-marker svg{width:34px;height:34px;filter:drop-shadow(0 2px 8px rgba(231,84,128,.5));transition:filter .3s ease}
.heart-marker.fav svg{filter:drop-shadow(0 0 12px rgba(255,215,0,.7))}
.heart-marker .marker-pulse{position:absolute;width:44px;height:44px;border-radius:50%;background:rgba(231,84,128,.15);animation:markerPulse 2s ease-in-out infinite;pointer-events:none}
@keyframes markerPulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.5);opacity:0}}
.leaflet-popup-content-wrapper{border-radius:var(--radius)!important;padding:0!important;overflow:hidden;box-shadow:0 8px 40px var(--shadow-strong)!important;background:#fff!important}
.leaflet-popup-content{margin:0!important;min-width:260px;max-width:320px}
.leaflet-popup-tip{box-shadow:none!important;background:#fff!important}
.popup-content{padding:0}
.popup-carousel{position:relative;width:100%;height:160px;background:var(--rose);overflow:hidden}
.popup-carousel img{width:100%;height:100%;object-fit:cover;display:none}
.popup-carousel img.active{display:block}
.popup-carousel .carousel-btn{position:absolute;top:50%;transform:translateY(-50%);width:28px;height:28px;border:none;border-radius:50%;background:rgba(0,0,0,.4);color:#fff;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s ease;z-index:2;line-height:1}
.popup-carousel .carousel-btn:hover{background:rgba(0,0,0,.6)}
.popup-carousel .carousel-prev{left:6px}
.popup-carousel .carousel-next{right:6px}
.popup-carousel .carousel-dots{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);display:flex;gap:4px}
.popup-carousel .carousel-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.5);transition:background .2s ease;cursor:pointer}
.popup-carousel .carousel-dot.active{background:#fff}
.popup-carousel .carousel-placeholder{display:flex;align-items:center;justify-content:center;width:100%;height:100%;font-size:2.5rem;color:var(--rose-deep)}
.popup-body{padding:.9rem 1rem 1rem}
.popup-body .popup-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px}
.popup-body .popup-top-left{flex:1;min-width:0}
.popup-mood{font-size:1.3rem;margin-bottom:.1rem}
.popup-name{font-family:var(--font-display);font-size:1rem;font-weight:600;color:var(--text)}
.popup-country{font-size:.7rem;color:var(--text-light);margin-bottom:.25rem}
.popup-date{font-size:.7rem;color:var(--rose-dark);font-weight:500}
.popup-fav{font-size:1.1rem;cursor:pointer;transition:transform .2s ease;flex-shrink:0;background:none;border:none;line-height:1}
.popup-fav:hover{transform:scale(1.2)}
.popup-tags{display:flex;flex-wrap:wrap;gap:4px;margin:.35rem 0}
.popup-tag{font-size:.6rem;background:var(--rose);color:var(--rose-dark);padding:2px 7px;border-radius:6px;font-weight:500;letter-spacing:.02em}
.popup-story{font-size:.82rem;color:var(--text-light);line-height:1.5;font-weight:300;margin-top:.3rem}
#timeline-view{background:var(--bg);overflow-y:auto;padding:.75rem}
.timeline-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text-light);text-align:center;padding:2rem}
.timeline-empty .empty-icon{font-size:3rem;margin-bottom:1rem}
.timeline-empty p{font-style:italic;font-weight:300}
.timeline-list{max-width:600px;margin:0 auto;padding-bottom:5rem}
.timeline-item{background:#fff;border-radius:var(--radius);padding:1rem 1.15rem;margin-bottom:.7rem;box-shadow:0 2px 12px var(--shadow);cursor:pointer;transition:all var(--transition);border:1px solid rgba(232,160,180,.1);animation:slideUp .4s ease backwards;position:relative}
.timeline-item:hover{transform:translateY(-2px);box-shadow:0 6px 24px var(--shadow)}
.timeline-item:active{transform:scale(.98)}
.timeline-item.fav{border-color:var(--gold-light);box-shadow:0 2px 16px rgba(201,138,91,.2)}
.timeline-item.fav::after{content:'⭐';position:absolute;top:6px;right:8px;font-size:.85rem;opacity:.7}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.timeline-item-top{display:flex;align-items:flex-start;gap:.7rem}
.timeline-mood{font-size:1.6rem;flex-shrink:0;line-height:1}
.timeline-info{flex:1;min-width:0}
.timeline-name{font-family:var(--font-display);font-size:.95rem;font-weight:600;color:var(--text);margin-bottom:.05rem}
.timeline-country{font-size:.72rem;color:var(--text-light)}
.timeline-date{font-size:.65rem;color:var(--rose-dark);font-weight:500}
.timeline-story{font-size:.8rem;color:var(--text-light);line-height:1.5;margin-top:.4rem;font-weight:300;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.timeline-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:.35rem}
.timeline-tag{font-size:.55rem;background:var(--rose);color:var(--rose-dark);padding:1px 6px;border-radius:5px;font-weight:500}
.timeline-thumbs{display:flex;gap:4px;margin-top:.4rem}
.timeline-thumbs img{width:40px;height:40px;border-radius:7px;object-fit:cover;border:1px solid var(--rose)}
.fab{position:fixed;bottom:1.5rem;right:1.5rem;z-index:100;width:54px;height:54px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--rose-deep),var(--rose-dark));color:#fff;font-size:1.8rem;cursor:pointer;box-shadow:0 4px 20px var(--shadow-strong);transition:all var(--transition);display:flex;align-items:center;justify-content:center;line-height:1}
.fab:hover{transform:translateY(-3px) scale(1.05);box-shadow:0 8px 30px var(--shadow-strong)}
.fab:active{transform:scale(.92)}
.route-toggle{position:absolute;bottom:1.5rem;left:1.5rem;z-index:100;padding:.5rem .9rem;border:none;border-radius:var(--radius-sm);background:#fff;color:var(--text-light);font-size:.72rem;font-family:var(--font-body);font-weight:500;cursor:pointer;box-shadow:0 2px 12px var(--shadow);transition:all .25s ease;display:flex;align-items:center;gap:5px}
.route-toggle:hover{color:var(--rose-dark);box-shadow:0 4px 16px var(--shadow-strong)}
.route-toggle.active{color:var(--rose-dark);background:var(--rose)}
.map-add-hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:50;background:rgba(255,255,255,.95);padding:.7rem 1.2rem;border-radius:var(--radius);box-shadow:0 4px 24px var(--shadow-strong);font-size:.9rem;color:var(--text);font-weight:500;display:none;pointer-events:none;animation:bounceIn .5s cubic-bezier(.34,1.56,.64,1);white-space:nowrap}
@keyframes bounceIn{0%{opacity:0;transform:translate(-50%,-50%) scale(.8)}100%{opacity:1;transform:translate(-50%,-50%) scale(1)}}
.modal-overlay{position:fixed;inset:0;z-index:500;background:rgba(74,48,52,.4);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:1rem;opacity:0;pointer-events:none;transition:opacity .35s ease}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:#fff;border-radius:var(--radius);max-width:520px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(74,48,52,.3);transform:scale(.9) translateY(20px);transition:transform .4s cubic-bezier(.34,1.56,.64,1)}
.modal-overlay.open .modal{transform:scale(1) translateY(0)}
.modal-overlay.add-mode .modal{pointer-events:all}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:1.2rem 1.4rem 0}
.modal-title{font-family:var(--font-display);font-size:1.25rem;font-weight:600;color:var(--text)}
.modal-close{width:34px;height:34px;border:none;background:var(--rose);border-radius:50%;cursor:pointer;font-size:1.1rem;color:var(--text-light);display:flex;align-items:center;justify-content:center;transition:all .2s ease}
.modal-close:hover{background:var(--rose-deep);color:#fff}
.modal-body{padding:1.2rem 1.4rem 1.4rem}
.memory-view .mv-mood{font-size:2.2rem;margin-bottom:.15rem}
.memory-view .mv-name{font-family:var(--font-display);font-size:1.3rem;font-weight:600;color:var(--text)}
.memory-view .mv-country{font-size:.82rem;color:var(--text-light);margin-bottom:.1rem}
.memory-view .mv-date{font-size:.78rem;color:var(--rose-dark);font-weight:500;margin-bottom:.75rem}
.memory-view .mv-story{font-size:.92rem;color:var(--text);line-height:1.7;font-weight:300;margin-bottom:.75rem;white-space:pre-wrap}
.mv-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:.75rem}
.mv-tag{font-size:.7rem;background:var(--rose);color:var(--rose-dark);padding:3px 10px;border-radius:7px;font-weight:500}
.mv-photos{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:6px;margin-bottom:.75rem}
.mv-photos img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:var(--radius-sm);cursor:pointer;transition:transform .3s ease}
.mv-photos img:hover{transform:scale(1.03)}
.mv-actions{display:flex;gap:.6rem;margin-top:1rem}
.mv-btn{flex:1;padding:.65rem;border:none;border-radius:var(--radius-sm);font-family:var(--font-body);font-weight:500;font-size:.82rem;cursor:pointer;transition:all .25s ease;display:flex;align-items:center;justify-content:center;gap:5px}
.mv-btn-edit{background:var(--rose);color:var(--text)}
.mv-btn-edit:hover{background:var(--rose-deep);color:#fff}
.mv-btn-fav{background:var(--rose-light);color:var(--gold)}
.mv-btn-fav:hover,.mv-btn-fav.active{background:#fff3cd;color:#b8860b}
.mv-btn-delete{background:transparent;color:var(--text-light);border:1px solid #ddd}
.mv-btn-delete:hover{background:#fee;color:#c0392b;border-color:#fcc}
.form-group{margin-bottom:.9rem}
.form-label{display:block;font-size:.78rem;font-weight:500;color:var(--text);margin-bottom:.3rem}
.form-input,.form-select{width:100%;padding:.65rem .85rem;border:1.5px solid #eee;border-radius:var(--radius-sm);font-family:var(--font-body);font-size:.88rem;color:var(--text);background:var(--bg);transition:border-color .25s ease,box-shadow .25s ease;outline:none}
.form-input:focus,.form-select:focus{border-color:var(--rose-deep);box-shadow:0 0 0 3px var(--shadow)}
.form-select{cursor:pointer;appearance:auto}
.form-coords{display:flex;gap:.7rem}
.form-coords .form-group{flex:1;margin-bottom:0}
.form-coords .form-input{font-size:.82rem}
.map-click-hint{font-size:.72rem;color:var(--rose-dark);margin-bottom:.6rem;font-weight:500;display:flex;align-items:center;gap:5px}
.location-search-wrap{position:relative}
.location-search-input{padding-right:2rem}
.location-search-results{position:absolute;top:100%;left:0;right:0;z-index:20;background:#fff;border:1.5px solid var(--rose);border-radius:var(--radius-sm);box-shadow:0 4px 20px var(--shadow);max-height:220px;overflow-y:auto;display:none}
.location-search-result{padding:.5rem .7rem;cursor:pointer;font-size:.82rem;color:var(--text);transition:background .15s ease;border-bottom:1px solid var(--rose-light)}
.location-search-result:last-child{border-bottom:none}
.location-search-result:hover{background:var(--rose-light);color:var(--rose-dark)}
.location-search-result .result-name{font-weight:500}
.location-search-result .result-country{font-size:.68rem;color:var(--text-light)}
.current-loc-btn{padding:.4rem .8rem;border:1.5px solid var(--rose-deep);border-radius:var(--radius-sm);background:var(--rose-light);color:var(--rose-dark);font-family:var(--font-body);font-size:.78rem;font-weight:500;cursor:pointer;transition:all .25s ease;white-space:nowrap;flex-shrink:0}
.current-loc-btn:hover{background:var(--rose);border-color:var(--rose-dark)}
.current-loc-btn:disabled{opacity:.5;cursor:wait}

.form-textarea{resize:vertical;min-height:68px;font-family:var(--font-body);font-size:.82rem;line-height:1.55;padding:.5rem .65rem}
.mood-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(40px,1fr));gap:3px;margin-bottom:.3rem}
.mood-btn{width:100%;aspect-ratio:1;border:2px solid transparent;border-radius:var(--radius-sm);background:var(--bg);font-size:1.2rem;cursor:pointer;transition:all .2s ease;display:flex;align-items:center;justify-content:center;padding:0}
.mood-btn:hover{border-color:var(--rose-deep);background:var(--rose-light);transform:scale(1.12);z-index:1}
.mood-btn.selected{border-color:var(--rose-dark);background:var(--rose);box-shadow:0 0 0 2px var(--rose-dark);transform:scale(1.12);z-index:1}

.photo-upload-area{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.photo-upload-btn{padding:.6rem 1.2rem;border:2px dashed var(--rose-deep);border-radius:var(--radius-sm);background:var(--rose-light);color:var(--rose-dark);font-family:var(--font-body);font-size:.85rem;font-weight:500;cursor:pointer;transition:all .25s ease}
.photo-upload-btn:hover{background:var(--rose);border-color:var(--rose-dark);color:var(--text)}
.photo-upload-hint{font-size:.72rem;color:var(--text-light);font-style:italic}
.upload-progress{display:flex;flex-direction:column;gap:4px;margin-bottom:.5rem}
.upload-progress-item{display:flex;align-items:center;gap:6px;font-size:.78rem;color:var(--text-light)}
.upload-progress-item .spinner{width:14px;height:14px;border:2px solid var(--rose);border-top-color:var(--rose-dark);border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0}
.upload-progress-item .check{color:#4caf50;font-weight:bold}
.upload-progress-item .fail{color:#e74c3c}
.photo-previews{display:flex;flex-wrap:wrap;gap:6px;margin-top:.3rem}
.photo-preview{position:relative;width:68px;height:68px;border-radius:var(--radius-sm);overflow:hidden}
.photo-preview img{width:100%;height:100%;object-fit:cover}
.photo-preview .remove-photo{position:absolute;top:2px;right:2px;width:18px;height:18px;border:none;border-radius:50%;background:rgba(0,0,0,.5);color:#fff;font-size:.65rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.form-submit{width:100%;padding:.8rem;border:none;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--rose-deep),var(--rose-dark));color:#fff;font-family:var(--font-body);font-weight:600;font-size:.92rem;cursor:pointer;transition:all var(--transition);margin-top:.3rem}
.form-submit:hover{transform:translateY(-2px);box-shadow:0 6px 20px var(--shadow-strong)}
.form-submit:active{transform:scale(.97)}
.form-submit:disabled{opacity:.6;cursor:not-allowed;transform:none!important}

.toast{position:fixed;bottom:5rem;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:#fff;padding:.65rem 1.3rem;border-radius:12px;font-size:.82rem;font-weight:500;z-index:700;opacity:0;pointer-events:none;transition:all .35s ease;box-shadow:0 4px 20px rgba(0,0,0,.2);display:flex;align-items:center;gap:10px;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:all}
.toast-btn{padding:.35rem .8rem;border:1px solid rgba(255,255,255,.4);border-radius:8px;background:transparent;color:#fff;font-family:var(--font-body);font-size:.78rem;font-weight:500;cursor:pointer;transition:all .2s ease}
.toast-btn:hover{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.7)}
.loading{display:flex;align-items:center;justify-content:center;padding:2rem;color:var(--text-light);gap:8px;font-size:.9rem}
.loading .spinner{width:20px;height:20px;border:2px solid var(--rose);border-top-color:var(--rose-dark);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.settings-icon{width:34px;height:34px;border:none;background:transparent;border-radius:50%;cursor:pointer;font-size:1.15rem;display:flex;align-items:center;justify-content:center;transition:all .25s ease;color:var(--text-light);flex-shrink:0}
.settings-icon:hover{background:var(--rose);color:var(--text);transform:rotate(30deg)}
.settings-section{margin-bottom:1.3rem}
.settings-section-title{font-family:var(--font-display);font-size:1rem;font-weight:600;color:var(--text);margin-bottom:.6rem;padding-bottom:.35rem;border-bottom:1.5px solid var(--rose)}
.settings-row{display:flex;gap:.7rem;margin-bottom:.7rem}
.settings-row .form-group{flex:1;margin-bottom:0}
.settings-btn{width:100%;padding:.65rem;border:none;border-radius:var(--radius-sm);font-family:var(--font-body);font-weight:500;font-size:.82rem;cursor:pointer;transition:all .25s ease;display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:.45rem}
.settings-btn-primary{background:linear-gradient(135deg,var(--rose-deep),var(--rose-dark));color:#fff}
.settings-btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 16px var(--shadow-strong)}
.settings-btn-secondary{background:var(--rose);color:var(--text)}
.settings-btn-secondary:hover{background:var(--rose-deep);color:#fff}
.settings-btn-danger{background:transparent;color:var(--text-light);border:1.5px solid #f0d0d0}
.settings-btn-danger:hover{background:#fff0f0;color:#c0392b;border-color:#fcc}
.settings-hint{font-size:.72rem;color:var(--text-light);margin-bottom:.4rem;font-style:italic}
.storage-indicator{margin-top:.5rem;margin-bottom:.5rem}
.storage-bar-bg{height:5px;background:var(--rose);border-radius:3px;overflow:hidden;margin-bottom:.25rem}
.storage-bar-fill{height:100%;background:linear-gradient(90deg,var(--rose-deep),var(--rose-dark));border-radius:3px;transition:width .5s ease}
.storage-text{font-size:.65rem;color:var(--text-light);display:flex;justify-content:space-between}
.hero-form{max-width:400px;margin:0 auto;text-align:left;width:100%}
.hero-form .form-group{margin-bottom:1.1rem}
.hero-form .form-label{font-size:.82rem;color:var(--text);font-weight:500}
.hero-form .form-input{background:rgba(255,255,255,.7);border-color:rgba(232,160,180,.3)}
.hero-form .form-input:focus{background:#fff;border-color:var(--rose-deep)}
.hero-form .hero-subtitle{margin-bottom:1.3rem;font-size:1rem}

.anniversary-banner{position:fixed;top:0;left:0;right:0;z-index:900;background:linear-gradient(135deg,var(--gold-light),var(--gold));color:#fff;text-align:center;padding:.5rem 1rem;font-size:.82rem;font-weight:500;transform:translateY(-100%);transition:transform .5s ease;box-shadow:0 2px 12px rgba(0,0,0,.1)}
.anniversary-banner.show{transform:translateY(0)}
.anniversary-banner .close-banner{background:none;border:none;color:#fff;font-size:1.2rem;cursor:pointer;margin-left:10px;opacity:.7;vertical-align:middle}
.anniversary-banner .close-banner:hover{opacity:1}
#timeline-view::-webkit-scrollbar{width:5px}

.modal::-webkit-scrollbar{width:5px}
.modal::-webkit-scrollbar-track{background:transparent}
.modal::-webkit-scrollbar-thumb{background:var(--rose-deep);border-radius:3px}
.search-bar{padding:0 0 .6rem;display:flex;gap:5px;flex-wrap:wrap}
.search-input-wrap{flex:1;min-width:130px;position:relative}
.search-input-wrap .search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:.8rem;pointer-events:none}
.search-input-wrap input{width:100%;padding:.45rem .5rem .45rem 1.8rem;border:1.5px solid #eee;border-radius:var(--radius-sm);font-family:var(--font-body);font-size:.78rem;color:var(--text);background:#fff;outline:none;transition:border-color .25s ease}
.search-input-wrap input:focus{border-color:var(--rose-deep)}
.search-filter-select{padding:.45rem .55rem;border:1.5px solid #eee;border-radius:var(--radius-sm);font-family:var(--font-body);font-size:.75rem;color:var(--text);background:#fff;outline:none;cursor:pointer;transition:border-color .25s ease}

}

*{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}

}

<body>

<div class="anniversary-banner" id="anniversaryBanner">
  <span id="anniversaryText"></span>
  <button class="close-banner" onclick="closeAnniversaryBanner()">✕</button>
</div>

<div id="loadingScreen" style="position:fixed;inset:0;z-index:2000;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#fff8f5">
  <div style="font-size:2.5rem;margin-bottom:.5rem;animation:pulse 1.5s ease-in-out infinite">💕</div>
  <div style="font-family:'Playfair Display',serif;font-size:1.2rem;color:#4a3034">Načítavam spomienky...</div>
  <div style="margin-top:1rem;width:30px;height:30px;border:2px solid #fce4ec;border-top-color:#e75480;border-radius:50%;animation:spin .6s linear infinite"></div>
</div>

<div id="hero">
  <div class="hearts-bg" id="heartsBg"></div>
  <div class="hero-content" id="heroContent">
    <span class="hero-heart">💕</span>
    <h1 class="hero-title">Mapa našich <span class="accent">spomienok</span></h1>
    <div id="heroBody"></div>
  </div>
</div>

<div id="app">
  <div class="top-bar">
    <div class="top-bar-top">
      <div class="app-title">
        <span class="heart-inline">❤️</span> Naša mapa
        <span class="sub" id="namesSub">Martin &amp; Aďka</span>
      </div>
      <div class="top-actions">
        <button class="settings-icon" onclick="openSettings()" aria-label="Nastavenia" title="Nastavenia">⚙️</button>
        <div class="view-toggle">
          <button class="view-btn active" data-view="map" onclick="switchView('map')">
            <svg viewBox="0 0 24 24"><path d="M20.5 3l-.16.03L15 5.1 9 3 3.36 4.9c-.21.07-.36.25-.36.48V20.5c0 .28.22.5.5.5l.16-.03L9 18.9l6 2.1 5.64-1.9c.21-.07.36-.25.36-.48V3.5c0-.28-.22-.5-.5-.5zM15 19l-6-2.11V5l6 2.11V19z"/></svg>
            <span>Mapa</span>
          </button>
          <button class="view-btn" data-view="timeline" onclick="switchView('timeline')">
            <svg viewBox="0 0 24 24"><path d="M23 8c0 1.1-.9 2-2 2-.18 0-.35-.02-.51-.07l-3.56 3.55c.05.16.07.34.07.52 0 1.1-.9 2-2 2s-2-.9-2-2c0-.18.02-.36.07-.52l-3.55-3.56c-.16.05-.34.07-.52.07s-.36-.02-.52-.07l-3.55 3.56c.05.16.07.34.07.52 0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2c.18 0 .35.02.51.07l3.56-3.55C8.02 9.36 8 9.18 8 9c0-1.1.9-2 2-2s2 .9 2 2c0 .18-.02.36-.07.52l3.55 3.56c.16-.05.34-.07.52-.07s.36.02.52.07l3.55-3.56C19.98 9.36 20 9.18 20 9c0-1.1.9-2 2-2s2 .9 2 2z"/></svg>
            <span>Timeline</span>
          </button>
        </div>
      </div>
    </div>
    <div class="stats">
      <div class="stat-item"><div class="stat-number" id="statPlaces">0</div><div class="stat-label">miest</div></div>
      <div class="stat-item"><div class="stat-number" id="statCountries">0</div><div class="stat-label">krajín</div></div>
      <div class="stat-item"><div class="stat-number" id="statMemories">0</div><div class="stat-label">spomienok</div></div>
    </div>
    <div class="counter-bar" id="counterBar"></div>
  </div>

  <div class="main-content">
      <div class="view-panel" id="map-view">
        <div id="map"></div>
        <button class="route-toggle" id="routeToggle" onclick="toggleRoute()">🗺️ Trasa</button>
        <div class="map-add-hint" id="mapAddHint">👆 Klikni do mapy pre pridanie pinu</div>
      </div>
    <div class="view-panel hidden" id="timeline-view">
      <div style="padding:.6rem .75rem 0">
        <div class="search-bar">
          <div class="search-input-wrap"><span class="search-icon">🔍</span><input id="searchInput" placeholder="Hľadať spomienku..." oninput="applyFilters()" /></div>
          <select class="search-filter-select" id="filterCountry" onchange="applyFilters()"><option value="">Krajina</option></select>
          <select class="search-filter-select" id="filterMood" onchange="applyFilters()"><option value="">Nálada</option></select>
          <select class="search-filter-select" id="filterTag" onchange="applyFilters()"><option value="">Štítok</option></select>
          <button class="search-clear-btn" onclick="clearFilters()" title="Zrušiť filter">✕</button>
        </div>
      </div>
      <div class="timeline-empty" id="timelineEmpty"><div class="empty-icon">🗺️</div><p>Zatiaľ tu nie sú žiadne spomienky.<br>Pridajte prvú! 💕</p></div>
      <div class="timeline-list" id="timelineList"></div>
    </div>
  </div>

  <button class="fab" onclick="openAddModal()" aria-label="Pridať spomienku">+</button>
  <div class="toast" id="toast"></div>
</div>

<div class="modal-overlay" id="modalOverlay"><div class="modal" id="modal"><div class="modal-header"><div class="modal-title" id="modalTitle">Spomienka</div><button class="modal-close" onclick="closeModal()">✕</button></div><div class="modal-body" id="modalBody"></div></div></div>
<div class="modal-overlay" id="settingsOverlay"><div class="modal" id="settingsModal" style="max-width:460px"><div class="modal-header"><div class="modal-title">⚙️ Nastavenia</div><button class="modal-close" onclick="closeSettings()">✕</button></div><div class="modal-body" id="settingsBody"><div class="loading"><div class="spinner"></div> Načítavam...</div></div></div></div>

<input type="file" id="importInput" accept=".json" style="display:none" onchange="handleImport(event)" />
<div class="lightbox-overlay" id="lightbox" onclick="closeLightbox()"><button class="lightbox-close" onclick="closeLightbox()">✕</button><img id="lightboxImg" src="" alt="Foto"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
(function() {
  'use strict';

  // ============================================
  // 🔑 SUPABASE CONFIG - VLOŽ SVOJE HODNOTY
  // ============================================
  const SUPABASE_URL = 'https://ssqnjpirzcweqsdhfkgx.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_Y_Rq9Wt01hUj4kqRZUwiGg_6pAQjlDI';
  // ============================================
  // ☁️ CLOUDINARY - fotky
  // ============================================
  const CLOUD_NAME = 'hxvksf8l';
  const UPLOAD_PRESET = 'moje-fotky';
  // ============================================

  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // ===== STATE =====
  let memories = [];
  let settings = null;
  let mapInstance = null;
  let markers = [];
  let routeLine = null;
  let showRouteFlag = false;
  let currentView = 'map';
  let isAddMode = false;
  let tempMarker = null;
  let editingId = null;
  let pendingPhotos = [];
  let pendingTags = [];
  let isLoading = true;
  let deletedMemory = null;
  let undoFn = null;
  let counterInterval = null;
  let formDirty = false;

  // ===== DOM REFS =====
  const hero = document.getElementById('hero');
  const heroBody = document.getElementById('heroBody');
  const app = document.getElementById('app');
  const mapView = document.getElementById('map-view');
  const timelineView = document.getElementById('timeline-view');
  const mapContainer = document.getElementById('map');
  const timelineList = document.getElementById('timelineList');
  const timelineEmpty = document.getElementById('timelineEmpty');
  const modalOverlay = document.getElementById('modalOverlay');
  const modalBody = document.getElementById('modalBody');
  const modalTitle = document.getElementById('modalTitle');
  const settingsOverlay = document.getElementById('settingsOverlay');
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightboxImg');
  const toast = document.getElementById('toast');
  const loadingScreen = document.getElementById('loadingScreen');

  // ===== DATA LAYER =====
  async function loadMemories() {
    const { data, error } = await supabaseClient.from('memories').select('*').order('date', { ascending: false });
    if (error) throw error;
    return data || [];
  }

  async function addMemoryToDB(mem) {
    const { data, error } = await supabaseClient.from('memories').insert(mem).select();
    if (error) throw error;
    return data[0];
  }

  async function updateMemoryInDB(id, updates) {
    const { error } = await supabaseClient.from('memories').update(updates).eq('id', id);
    if (error) throw error;
  }

  async function deleteMemoryFromDB(id) {
    const { error } = await supabaseClient.from('memories').delete().eq('id', id);
    if (error) throw error;
  }

  async function loadSettingsFromDB() {
    const { data, error } = await supabaseClient.from('settings').select('*').eq('id', 1).maybeSingle();
    if (error) throw error;
    return data;
  }

  async function saveSettingsToDB(s) {
    const { error } = await supabaseClient.from('settings').upsert({ id: 1, ...s });
    if (error) throw error;
  }

  // ===== SAMPLE DATA =====
  const sampleMemories = [
    { name:'Bratislava', country:'Slovensko', lat:48.1486, lng:17.1077, date:'2023-06-15', story:'...alebo naše prvé rande? Prechádzka po Hrade, zmrzlina na Hlavnom námestí a ten najkrajší západ slnka nad Dunajom. 🥰', mood:'🥰', tags:['prvý raz'], photos:[], favorite:false },
    { name:'Viedeň', country:'Rakúsko', lat:48.2082, lng:16.3738, date:'2023-09-20', story:'Víkend vo Viedni! Schönbrunn, Sacher torta a večer sme tancovali na koncerte.', mood:'😂', tags:[], photos:[], favorite:false },
    { name:'Budapešť', country:'Maďarsko', lat:47.4979, lng:19.0402, date:'2024-04-08', story:'Jarný výlet do Budapešti. Kúpele, langoše a nočné kúpanie v Gellérte pod hviezdami. 🌅', mood:'🌅', tags:['cestovanie'], photos:[], favorite:false },
    { name:'Paríž', country:'Francúzsko', lat:48.8566, lng:2.3522, date:'2024-08-14', story:'Náš veľký výlet do Paríža! Eiffelovka v noci, croissanty na Montmartre a bozk na Sacré-Cœur. ❤️', mood:'❤️', tags:['výročie','obľúbené'], photos:[], favorite:true },
    { name:'Praha', country:'Česko', lat:50.0755, lng:14.4378, date:'2024-12-06', story:'Vianočné trhy v Prahe! Punč, trdelník a nádherný stromček na Staromáku. 🎄', mood:'🎄', tags:['Vianoce'], photos:[], favorite:false },
    { name:'Rím', country:'Taliansko', lat:41.9028, lng:12.4964, date:'2025-05-20', story:'Výročie oslavené v Ríme. Španielske schody, fontána di Trevi a najlepšia pasta v Trastevere. 🌹', mood:'🌹', tags:['výročie'], photos:[], favorite:true }
  ];

  // ===== INIT =====
  async function initApp() {
    try {
      // Load settings
      settings = await loadSettingsFromDB();
      if (settings) {
        document.getElementById('namesSub').textContent = settings.name1 && settings.name2
          ? `${settings.name1} & ${settings.name2}` : '';
      }

      // Load memories
      memories = await loadMemories();

      // Check if first launch (no settings, no memories)
      const isFirstLaunch = !settings;

      if (isFirstLaunch) {
        // First launch — setup form
        heroBody.innerHTML = `
          <p class="hero-subtitle">Vitajte v našej mape spomienok! 💕</p>
          <div class="hero-form">
            <div class="form-group">
              <label class="form-label">Tvoje meno</label>
              <input class="form-input" id="setupName1" placeholder="napr. Martina" />
            </div>
            <div class="form-group">
              <label class="form-label">Meno partnera/ky</label>
              <input class="form-input" id="setupName2" placeholder="napr. Peter" />
            </div>
            <div class="form-group">
              <label class="form-label">Spolu od (dátum)</label>
              <input class="form-input" id="setupSince" type="date" />
            </div>
            <p style="font-size:.8rem;color:var(--text-light);text-align:center;margin-bottom:.75rem;font-style:italic">Na začiatok môžeme pridať pár ukážkových spomienok.</p>
            <button class="hero-btn" onclick="submitSetup()">💕 Začať našu mapu</button>
          </div>`;
      } else {
        // Normal launch - show hero with enter button
        heroBody.innerHTML = `
          <p class="hero-subtitle">Každé miesto, kde sme spolu boli, je kúskom nášho príbehu. 🥰</p>
          <button class="hero-btn" onclick="enterApp()">
            Vstúpiť do spomienok
            <svg viewBox="0 0 24 24"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg>
          </button>`;
      }

    } catch (err) {
      console.error('Init error:', err);
      heroBody.innerHTML = `<p class="hero-subtitle">⚠️ Nepodarilo sa načítať dáta. Skontroluj pripojenie k Supabase.</p>
        <p style="font-size:.8rem;color:var(--text-light)">${err.message}</p>`;
    } finally {
      loadingScreen.style.display = 'none';
    }
  }

  // ===== SETUP =====
  window.submitSetup = async function() {
    const name1 = document.getElementById('setupName1').value.trim();
    const name2 = document.getElementById('setupName2').value.trim();
    const sinceDate = document.getElementById('setupSince').value;

    if (!name1 || !name2) { alert('Prosím vyplň obe mená.'); return; }

    try {
      await saveSettingsToDB({ name1, name2, since_date: sinceDate || null });
      settings = { name1, name2, since_date: sinceDate || null };
      document.getElementById('namesSub').textContent = `${name1} & ${name2}`;

      // Insert sample memories only on first launch
      if (!settings && memories.length === 0) {
        for (const s of sampleMemories) {
          await addMemoryToDB(s);
        }
        memories = await loadMemories();
      }

      enterApp();
    } catch (err) {
      alert('Chyba pri ukladaní: ' + err.message);
    }
  };

  // ===== ENTER APP =====
  window.enterApp = function() {
    hero.classList.add('hidden');
    app.classList.add('visible');
    setTimeout(() => {
      hero.style.display = 'none';
      if (mapInstance) mapInstance.invalidateSize();
      fitMapToMarkers();
      updateRoute();
    }, 800);

    // Show "this day" or anniversary
    setTimeout(() => {
      showThisDayMemory();
      checkAnniversaries();
    }, 1200);

    // Start counter
    startCounter();
  };

  // ===== MAP =====
  function initMap() {
    mapInstance = L.map(mapContainer, {
      center: [48.5, 17.5], zoom: 5,
      zoomControl: true, attributionControl: true,
      fadeAnimation: true, zoomAnimation: true, scrollWheelZoom: true,
    });

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; <a href="https://openstreetmap.org/copyright">OpenStreetMap</a>', maxZoom: 19,
    }).addTo(mapInstance);

    const HeartIcon = L.divIcon({
      className: 'heart-marker',
      html: `<div class="marker-pulse"></div>
        <svg viewBox="0 0 24 24" fill="#e75480"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>`,
      iconSize: [34, 34], iconAnchor: [17, 34], popupAnchor: [0, -38],
    });

    memories.forEach(m => addMarker(m, HeartIcon));

    function reverseGeocode(lat, lng) {
      const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&accept-language=sk`;
      fetch(url).then(r => r.json()).then(d => {
        if (d && d.address) {
          const country = d.address.country || '';
          document.getElementById('formCountry').value = country;
          const city = d.address.city || d.address.town || d.address.village || d.address.county || '';
          if (!document.getElementById('formName').value.trim() && city) {
            document.getElementById('formName').value = city;
          }
        }
      }).catch(() => {});
    }

    mapInstance.on('click', function(e) {
      if (isAddMode) {
        if (tempMarker) mapInstance.removeLayer(tempMarker);
        const marker = L.marker(e.latlng, { icon: HeartIcon, draggable: true }).addTo(mapInstance);
        tempMarker = marker;

        if (modalOverlay.classList.contains('open')) {
          // Form už je otvorený — stačí updatovať hodnoty
          document.getElementById('formLat').value = e.latlng.lat.toFixed(5);
          document.getElementById('formLng').value = e.latlng.lng.toFixed(5);
          reverseGeocode(e.latlng.lat, e.latlng.lng);
        } else {
          // Prvý klik — otvoríme formulár s pinom
          openAddForm(e.latlng.lat, e.latlng.lng);
          reverseGeocode(e.latlng.lat, e.latlng.lng);
        }

        marker.on('dragend', function() {
          const pos = marker.getLatLng();
          document.getElementById('formLat').value = pos.lat.toFixed(5);
          document.getElementById('formLng').value = pos.lng.toFixed(5);
          reverseGeocode(pos.lat, pos.lng);
        });
      }
    });

    mapInstance.whenReady(() => fitMapToMarkers());
  }

  function addMarker(memory, icon) {
    if (!mapInstance) return;
    const marker = L.marker([memory.lat, memory.lng], { icon: icon }).addTo(mapInstance);
    if (memory.favorite) marker._icon && marker._icon.classList.add('fav');

    const popupHtml = buildPopupHtml(memory);
    marker.bindPopup(popupHtml, { className: 'custom-popup', maxWidth: 320, minWidth: 260 });
    marker.memoryId = memory.id;
    markers.push(marker);
    return marker;
  }

  function buildPopupHtml(m) {
    const photos = m.photos && m.photos.length > 0 ? m.photos : [];
    const hasPhotos = photos.length > 0;

    let carouselHtml = '';
    if (hasPhotos) {
      carouselHtml = `<div class="popup-carousel" id="carousel-${m.id}">
        ${photos.map((p, i) => `<img src="${p}" class="${i===0?'active':''}" alt="" />`).join('')}
        ${photos.length > 1 ? `
          <button class="carousel-btn carousel-prev" onclick="event.stopPropagation();carouselMove('${m.id}',-1)">‹</button>
          <button class="carousel-btn carousel-next" onclick="event.stopPropagation();carouselMove('${m.id}',1)">›</button>
          <div class="carousel-dots">${photos.map((_,i) => `<span class="carousel-dot ${i===0?'active':''}" onclick="event.stopPropagation();carouselGo('${m.id}',${i})"></span>`).join('')}</div>` : ''}
      </div>`;
    } else {
      carouselHtml = `<div class="popup-carousel"><div class="carousel-placeholder">${m.mood || '💕'}</div></div>`;
    }

    const tagsHtml = m.tags && m.tags.length > 0
      ? `<div class="popup-tags">${m.tags.map(t => `<span class="popup-tag">${escapeHtml(t)}</span>`).join('')}</div>` : '';

    return `<div class="popup-content">${carouselHtml}<div class="popup-body">
      <div class="popup-top">
        <div class="popup-top-left">
          ${m.mood ? `<div class="popup-mood">${m.mood}</div>` : ''}
          <div class="popup-name">${escapeHtml(m.name)}</div>
          <div class="popup-country">${escapeHtml(m.country)}</div>
          <div class="popup-date">📅 ${formatDate(m.date)}</div>
        </div>
        <button class="popup-fav" onclick="event.stopPropagation();toggleFav('${m.id}')">${m.favorite ? '⭐' : '☆'}</button>
      </div>
      ${tagsHtml}
      ${m.story ? `<div class="popup-story">${escapeHtml(truncateText(m.story,100))}</div>` : ''}
    </div></div>`;
  }

  // Carousel navigation (global for onclick)
  window.carouselMove = function(id, dir) {
    const container = document.getElementById('carousel-' + id);
    if (!container) return;
    const imgs = container.querySelectorAll('img');
    if (imgs.length < 2) return;
    let active = Array.from(imgs).findIndex(i => i.classList.contains('active'));
    imgs[active].classList.remove('active');
    active = (active + dir + imgs.length) % imgs.length;
    imgs[active].classList.add('active');
    const dots = container.querySelectorAll('.carousel-dot');
    if (dots.length) { dots.forEach(d => d.classList.remove('active')); dots[active].classList.add('active'); }
  };
  window.carouselGo = function(id, idx) {
    const container = document.getElementById('carousel-' + id);
    if (!container) return;
    const imgs = container.querySelectorAll('img');
    imgs.forEach(i => i.classList.remove('active'));
    imgs[idx].classList.add('active');
    const dots = container.querySelectorAll('.carousel-dot');
    dots.forEach(d => d.classList.remove('active'));
    dots[idx].classList.add('active');
  };
  window.toggleFav = async function(id) {
    const m = memories.find(x => x.id === id);
    if (!m) return;
    m.favorite = !m.favorite;
    try {
      await updateMemoryInDB(id, { favorite: m.favorite });
      refreshMapMarkers();
      if (currentView === 'timeline') renderTimeline();
      updateStats();
    } catch(err) { showToast('⚠️ Chyba pri ukladaní'); }
  };

  function fitMapToMarkers() {
    if (!mapInstance || markers.length === 0) {
      if (mapInstance) mapInstance.setView([48.5, 17.5], 5);
      return;
    }
    const group = L.featureGroup(markers);
    mapInstance.fitBounds(group.getBounds().pad(0.15));
    if (mapInstance.getZoom() > 8) mapInstance.setZoom(8);
  }

  function refreshMapMarkers() {
    if (!mapInstance) return;
    markers.forEach(m => mapInstance.removeLayer(m));
    markers = [];
    const HeartIcon = L.divIcon({
      className: 'heart-marker',
      html: `<div class="marker-pulse"></div>
        <svg viewBox="0 0 24 24" fill="#e75480"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>`,
      iconSize: [34, 34], iconAnchor: [17, 34], popupAnchor: [0, -38],
    });
    memories.forEach(m => addMarker(m, HeartIcon));
    updateRoute();
    fitMapToMarkers();
  }

  // ===== ROUTE LINE =====
  window.toggleRoute = function() {
    showRouteFlag = !showRouteFlag;
    document.getElementById('routeToggle').classList.toggle('active');
    updateRoute();
  };

  function updateRoute() {
    if (!mapInstance) return;
    if (routeLine) { mapInstance.removeLayer(routeLine); routeLine = null; }
    if (!showRouteFlag || memories.length < 2) return;

    const sorted = [...memories].sort((a, b) => new Date(a.date) - new Date(b.date));
    const latlngs = sorted.map(m => [m.lat, m.lng]);

    routeLine = L.polyline(latlngs, {
      color: '#e8a0b4', weight: 2, opacity: 0.6,
      dashArray: '6, 8',
    }).addTo(mapInstance);
  }

  // ===== VIEW SWITCH =====
  window.switchView = function(view) {
    if (view === currentView) return;
    if (isAddMode && view !== 'map') {
      if (formDirty && !confirm('Máš neuložené zmeny. Naozaj chceš prepnúť?')) return;
      isAddMode = false;
      editingId = null;
      formDirty = false;
      hideMapHint();
      modalOverlay.classList.remove('add-mode');
      if (tempMarker && mapInstance) { mapInstance.removeLayer(tempMarker); tempMarker = null; }

    currentView = view;
    document.querySelectorAll('.view-btn').forEach(b => b.classList.toggle('active', b.dataset.view === view));

  function startCounter() {
    if (counterInterval) clearInterval(counterInterval);
    updateCounter();
    counterInterval = setInterval(updateCounter, 60000);
  }

  function updateCounter() {
    const el = document.getElementById('counterBar');

    function counterHtml(msg) {
      return `<div class="counter-hearts">💕💕💕💕💕💕💕💕💕💕</div><div class="counter-text">${msg}</div>`;
    }

    if (!settings || !settings.since_date) {
      el.innerHTML = counterHtml(`<span class="counter-icon">💕</span> Spolu od <em>neznámeho dátumu</em>`);
      return;
    }

    const since = new Date(settings.since_date + 'T00:00:00');
    const now = new Date();
    const diff = now - since;
    if (diff <= 0) {
      el.innerHTML = counterHtml(`<span class="counter-icon">💕</span> Spolu od <strong>${formatDate(settings.since_date)}</strong>`);
      return;
    }

    const days = Math.floor(diff / (1000*60*60*24));
    const years = Math.floor(days / 365);
    const months = Math.floor((days % 365) / 30);
    const remainingDays = Math.floor((days % 365) % 30);
    if (years > 0) {
      el.innerHTML = counterHtml(`<span class="counter-icon">💕</span> Spolu už <strong>${years} ${years===1?'rok':(years<5?'roky':'rokov')}</strong>, ${months} ${months===1?'mesiac':(months<5?'mesiace':'mesiacov')} a <strong>${remainingDays} ${remainingDays===1?'deň':'dní'}</strong>`);
    } else if (months > 0) {
      el.innerHTML = counterHtml(`<span class="counter-icon">💕</span> Spolu už <strong>${months} ${months===1?'mesiac':(months<5?'mesiace':'mesiacov')}</strong> a <strong>${remainingDays} ${remainingDays===1?'deň':'dní'}</strong>`);
    } else {
      el.innerHTML = counterHtml(`<span class="counter-icon">💕</span> Spolu už <strong>${days} ${days===1?'deň':'dní'}</strong>`);
    }
  }

  // ===== THIS DAY & ANNIVERSARY =====
  function showThisDayMemory() {
    const today = new Date();
    const todayMd = `${today.getMonth()+1}-${today.getDate()}`;
    const match = memories.find(m => {
      const d = new Date(m.date + 'T00:00:00');
      return `${d.getMonth()+1}-${d.getDate()}` === todayMd && d.getFullYear() < today.getFullYear();
    });
    if (match) {
      setTimeout(() => showToast(`📅 V tento deň pred rokom: ${match.name} ♥️`), 1500);
    }
  }

  function checkAnniversaries() {
    const today = new Date();
    const banner = document.getElementById('anniversaryBanner');
    const text = document.getElementById('anniversaryText');
    const soon = [];

    // Ak sme už v tejto session zavreli, neukazujeme
    if (sessionStorage.getItem('annivDismissed')) return;

    for (const m of memories) {
      const d = new Date(m.date + 'T00:00:00');
      const anniv = new Date(today.getFullYear(), d.getMonth(), d.getDate());
      const diffDays = Math.ceil((anniv - today) / (1000*60*60*24));
      if (diffDays >= 0 && diffDays <= 7) {
        const years = today.getFullYear() - d.getFullYear();
        if (years === 0) continue; // preskoč spomienky z tohto roku (nie je výročie)
        soon.push({ name: m.name, days: diffDays, years });
      }
    }

    if (soon.length > 0) {
      const msgs = soon.map(s => {
        if (s.days === 0) return `🎉 Dnes je výročie: ${s.name} (${s.years} ${s.years===1?'rok':'rokov'})!`;
        if (s.days === 1) return `⏰ Zajtra výročie: ${s.name} (${s.years} ${s.years===1?'rok':'rokov'})`;
        return `📅 O ${s.days} dní výročie: ${s.name}`;
      });
      text.textContent = msgs.join(' · ');
      banner.classList.add('show');
    }
  }

  // ===== PHOTO UPLOAD =====
  function setupPhotoUpload() {
    // File input is already set up via onchange in HTML
  }

  window.handlePhotoFiles = async function(e) {
    const files = e.target.files;
    if (!files || files.length === 0) return;

    const cloudName = CLOUD_NAME;
    const uploadPreset = UPLOAD_PRESET;

    const progressEl = document.getElementById('uploadProgress');
    progressEl.style.display = 'flex';
    progressEl.innerHTML = '';

    for (const file of files) {
      if (!file.type.startsWith('image/')) continue;
      if (file.size > 10 * 1024 * 1024) {
        progressEl.innerHTML += `<div class="upload-progress-item"><span class="fail">✕</span> ${escapeHtml(file.name)} — príliš veľký (max 10MB)</div>`;
        continue;
      }

      const item = document.createElement('div');
      item.className = 'upload-progress-item';
      item.innerHTML = `<span class="spinner"></span> ${escapeHtml(file.name)}`;
      progressEl.appendChild(item);

      try {
        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', uploadPreset);

        const res = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`, {
          method: 'POST',
          body: formData,
        });

        if (!res.ok) {
          const errData = await res.json().catch(() => ({}));
          throw new Error(errData.error?.message || `HTTP ${res.status}`);
        }

        const data = await res.json();
        pendingPhotos.push(data.secure_url);
        item.innerHTML = `<span class="check">✓</span> ${escapeHtml(file.name)}`;
        formDirty = true;
      } catch(err) {
        item.innerHTML = `<span class="fail">✕</span> ${escapeHtml(file.name)} — ${err.message}`;
      }
    }

    setTimeout(() => { progressEl.style.display = 'none'; }, 3000);
    renderPhotoPreviews();
    e.target.value = '';
  };

  function renderPhotoPreviews() {
    const container = document.getElementById('photoPreviews');
    if (!container) return;
    container.innerHTML = pendingPhotos.map((p, i) =>
      `<div class="photo-preview"><img src="${p}" alt="" /><button class="remove-photo" onclick="removePhoto(${i})">✕</button></div>`
    ).join('');
  }

  window.removePhoto = function(i) {
    pendingPhotos.splice(i, 1);
    renderPhotoPreviews();
    formDirty = true;
  };

  // ===== FORM SUBMIT =====
  window.submitForm = async function(e) {
    e.preventDefault();
    const btn = document.getElementById('formSubmit');
    btn.disabled = true; btn.textContent = '⏳ Ukladám...';

    const name = document.getElementById('formName').value.trim();
    const country = document.getElementById('formCountry').value.trim();
    const date = document.getElementById('formDate').value;
    const lat = parseFloat(document.getElementById('formLat').value);
    const lng = parseFloat(document.getElementById('formLng').value);
    const mood = document.getElementById('formMood')?.value || '';
    const story = document.getElementById('formStory')?.value.trim() || '';
    const photos = pendingPhotos.filter(p => p.trim());

    if (!name || !date) { showToast('⚠️ Vyplň názov a dátum.'); btn.disabled = false; btn.textContent = '💾 Uložiť spomienku'; return; }
    if (isNaN(lat) || isNaN(lng)) { showToast('⚠️ Klikni na mapu pre polohu.'); btn.disabled = false; btn.textContent = '💾 Uložiť spomienku'; return; }

    try {
      if (editingId) {
        await updateMemoryInDB(editingId, { name, country, date, lat, lng, mood, story, tags: pendingTags, photos });
        const idx = memories.findIndex(x => x.id === editingId);
        if (idx !== -1) memories[idx] = { ...memories[idx], name, country, date, lat, lng, mood, story, tags: pendingTags, photos };
        showToast('✅ Spomienka upravená!');
      } else {
        const newMem = { name, country, date, lat, lng, mood, story, tags: pendingTags, photos, favorite: false };
        const saved = await addMemoryToDB(newMem);
        memories.push(saved);
        showToast('🎉 Nová spomienka pridaná!');
      }

      formDirty = false;
      closeModal();
      refreshMapMarkers();
      updateStats();
      populateFilterDropdowns();
      if (currentView === 'timeline') renderTimeline();
    } catch(err) {
      showToast('⚠️ Chyba: ' + err.message);
    }
    btn.disabled = false; btn.textContent = '💾 Uložiť spomienku';
  };

  // ===== DELETE WITH UNDO =====
  window.deleteMemory = async function(id) {
    const m = memories.find(x => x.id === id);
    if (!m) return;
    const memory = { ...m };

    // Vymažem hneď z DB aj lokálne
    try {
      await deleteMemoryFromDB(id);
    } catch(err) {
      showToast('⚠️ Chyba pri mazaní: ' + err.message);
      return;
    }

    memories = memories.filter(x => x.id !== id);
    closeModal();
    refreshMapMarkers();
    updateStats();
    populateFilterDropdowns();
    if (currentView === 'timeline') renderTimeline();

    // Undo do 5 sekúnd
    toast.innerHTML = `🗑️ "${memory.name}" vymazaná <button class="toast-btn" id="toastUndoBtn">Späť</button>`;
    toast.classList.add('show');
    let undoing = false;

    const undoBtn = document.getElementById('toastUndoBtn');
    undoBtn.onclick = async function() {
      if (undoing) return;
      undoing = true;
      try {
        const saved = await addMemoryToDB(memory);
        memories.push(saved);
        refreshMapMarkers();
        updateStats();
        populateFilterDropdowns();
        if (currentView === 'timeline') renderTimeline();
        toast.innerHTML = '↩️ Spomienka obnovená.';
        setTimeout(() => toast.classList.remove('show'), 2000);
      } catch(err) {
        showToast('⚠️ Chyba pri obnove: ' + err.message);
      }
    };

    setTimeout(() => {
      if (!undoing) {
        toast.classList.remove('show');
      }
    }, 5000);
  };

  // ===== MODAL CONTROLS =====
  window.closeModal = function() {
    if (formDirty && !confirm('Máš neuložené zmeny. Naozaj chceš zavrieť formulár?')) return;
    modalOverlay.classList.remove('open', 'add-mode');
    isAddMode = false;
    editingId = null;
    formDirty = false;
    hideMapHint();
    if (tempMarker && mapInstance) { mapInstance.removeLayer(tempMarker); tempMarker = null; }
  };

  modalOverlay.addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  // ===== LOCATION SEARCH & GEOCODING =====
  let geocodeTimeout = null;
  let geoResultsData = [];

  window.searchLocation = function(query) {
    const resultsEl = document.getElementById('locationResults');
    clearTimeout(geocodeTimeout);

    if (!query || query.length < 2) {
      resultsEl.style.display = 'none';
      geoResultsData = [];
      return;
    }

    geocodeTimeout = setTimeout(async () => {
      try {
        const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=5&accept-language=sk`);
        if (!res.ok) return;
        const data = await res.json();

        if (!data || data.length === 0) {
          resultsEl.innerHTML = '<div class="location-search-result" style="color:var(--text-light);cursor:default">Žiadne výsledky</div>';
          resultsEl.style.display = 'block';
          geoResultsData = [];
          return;
        }

        geoResultsData = data;
        resultsEl.innerHTML = data.map((r, i) =>
          `<div class="location-search-result" data-idx="${i}">
            <div class="result-name">${escapeHtml(r.name)}</div>
            <div class="result-country">${escapeHtml(r.address?.country || '')}</div>
          </div>`
        ).join('');
        resultsEl.style.display = 'block';
      } catch(err) {
        console.error('Geocode error:', err);
      }
    }, 400);
  };

  // Click handler for location results (delegation)
  document.getElementById('locationResults')?.addEventListener('click', function(e) {
    const item = e.target.closest('.location-search-result');
    if (!item || !item.dataset.idx) return;
    const idx = parseInt(item.dataset.idx);
    const r = geoResultsData[idx];
    if (!r) return;

    const lat = parseFloat(r.lat);
    const lng = parseFloat(r.lon);
    const country = r.address?.country || '';

    document.getElementById('formLat').value = lat.toFixed(5);
    document.getElementById('formLng').value = lng.toFixed(5);
    document.getElementById('formCountry').value = country;
    document.getElementById('locationResults').style.display = 'none';
    document.getElementById('locationSearch').value = r.name;
    geoResultsData = [];

    // Place/update pin on map
    if (mapInstance) {
      if (tempMarker) mapInstance.removeLayer(tempMarker);
      const HeartIcon = L.divIcon({
        className: 'heart-marker',
        html: `<div class="marker-pulse"></div>
          <svg viewBox="0 0 24 24" fill="#e75480"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>`,
        iconSize: [34, 34], iconAnchor: [17, 34],
      });
      tempMarker = L.marker([lat, lng], { icon: HeartIcon, draggable: true }).addTo(mapInstance);
      tempMarker.on('dragend', function() {
        const pos = tempMarker.getLatLng();
        document.getElementById('formLat').value = pos.lat.toFixed(5);
        document.getElementById('formLng').value = pos.lng.toFixed(5);
      });
      mapInstance.setView([lat, lng], 10);
    }
    formDirty = true;
  });

  // Close location results on outside click
  document.addEventListener('click', function(e) {
    const wrap = document.querySelector('.location-search-wrap');
    const results = document.getElementById('locationResults');
    if (wrap && results && !wrap.contains(e.target)) {
      results.style.display = 'none';
      geoResultsData = [];
    }
  });

  window.useCurrentLocation = function() {
    const btn = document.querySelector('.current-loc-btn');
    if (!navigator.geolocation) {
      showToast('⚠️ Geolokácia nie je podporovaná v tomto prehliadači.');
      return;
    }

    btn.disabled = true;
    btn.textContent = '⏳ Zisťujem polohu...';

    navigator.geolocation.getCurrentPosition(async (pos) => {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;

      document.getElementById('formLat').value = lat.toFixed(5);
      document.getElementById('formLng').value = lng.toFixed(5);

      // Reverse geocode
      try {
        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&accept-language=sk`);
        const d = await res.json();
        if (d && d.address) {
          document.getElementById('formCountry').value = d.address.country || '';
          const city = d.address.city || d.address.town || d.address.village || '';
          if (!document.getElementById('formName').value.trim() && city) {
            document.getElementById('formName').value = city;
          }
        }
      } catch(e) { /* silent */ }

      // Place pin on map
      if (mapInstance) {
        if (tempMarker) mapInstance.removeLayer(tempMarker);
        const HeartIcon = L.divIcon({
          className: 'heart-marker',
          html: `<div class="marker-pulse"></div>
            <svg viewBox="0 0 24 24" fill="#e75480"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>`,
          iconSize: [34, 34], iconAnchor: [17, 34],
        });
        tempMarker = L.marker([lat, lng], { icon: HeartIcon, draggable: true }).addTo(mapInstance);
        tempMarker.on('dragend', function() {
          const p = tempMarker.getLatLng();
          document.getElementById('formLat').value = p.lat.toFixed(5);
          document.getElementById('formLng').value = p.lng.toFixed(5);
        });
        mapInstance.setView([lat, lng], 12);
      }

      formDirty = true;
      btn.disabled = false;
      btn.textContent = '📍 Moja poloha';
    }, (err) => {
      btn.disabled = false;
      btn.textContent = '📍 Moja poloha';
      if (err.code === 1) showToast('⚠️ Povoľ prístup k polohe v prehliadači.');
      else showToast('⚠️ Nepodarilo sa zistiť polohu.');
    }, { enableHighAccuracy: true, timeout: 10000 });
  };

  // ===== SETTINGS =====
  window.openSettings = function() {
    const sb = document.getElementById('settingsBody');
    sb.innerHTML = '<div class="loading"><div class="spinner"></div> Načítavam...</div>';
    settingsOverlay.classList.add('open');

    const storageEstimate = new Blob([JSON.stringify(memories)]).size;
    const storageLimit = 500 * 1024 * 1024; // 500 MB Supabase free tier (approx for display)
    const pct = Math.min(100, Math.round((storageEstimate / storageLimit) * 10000)) / 100; // tiny %

    sb.innerHTML = `
      <div class="settings-section">
        <div class="settings-section-title">👤 My</div>
        <div class="settings-row">
          <div class="form-group"><label class="form-label">Tvoje meno</label><input class="form-input" id="setName1" value="${escapeHtml(settings?.name1||'')}" /></div>
          <div class="form-group"><label class="form-label">Partner/ka</label><input class="form-input" id="setName2" value="${escapeHtml(settings?.name2||'')}" /></div>
        </div>
        <div class="form-group"><label class="form-label">Spolu od</label><input class="form-input" id="setSince" type="date" value="${settings?.since_date||''}" /></div>
        <button class="settings-btn settings-btn-primary" onclick="saveSettings()">💾 Uložiť nastavenia</button>
      </div>
      <div class="settings-section">
        <div class="settings-section-title">💾 Dáta</div>
        <div class="storage-indicator">
          <div class="storage-bar-bg"><div class="storage-bar-fill" style="width:${Math.min(100,pct*10)}%"></div></div>
          <div class="storage-text"><span>${formatBytes(storageEstimate)}</span><span>z ~500 MB</span></div>
        </div>
        <button class="settings-btn settings-btn-secondary" onclick="exportData()">📤 Exportovať JSON</button>
        <button class="settings-btn settings-btn-secondary" onclick="document.getElementById('importInput').click()">📥 Importovať JSON</button>
        <button class="settings-btn settings-btn-danger" onclick="resetSampleData()" style="margin-top:.5rem">🗑️ Vymazať ukážkové spomienky</button>
      </div>
      <div class="settings-section">
        <div class="settings-section-title">ℹ️ Info</div>
        <p style="font-size:.82rem;color:var(--text-light);line-height:1.6">Mapa našich spomienok 💕<br>Dáta sú uložené v Supabase databáze.<br>Verzia 2.0</p>
      </div>`;
  };

  window.closeSettings = function() {
    settingsOverlay.classList.remove('open');
  };

  settingsOverlay.addEventListener('click', function(e) {
    if (e.target === this) closeSettings();
  });

  window.saveSettings = async function() {
    const name1 = document.getElementById('setName1').value.trim();
    const name2 = document.getElementById('setName2').value.trim();
    const since_date = document.getElementById('setSince').value || null;
    try {
      await saveSettingsToDB({ name1, name2, since_date });
      settings = { ...settings, name1, name2, since_date };
      document.getElementById('namesSub').textContent = name1 && name2 ? `${name1} & ${name2}` : '';
      showToast('✅ Nastavenia uložené!');
      updateCounter();
      closeSettings();
    } catch(err) { showToast('⚠️ Chyba: ' + err.message); }
  };

  window.exportData = function() {
    const data = { memories, settings, exportedAt: new Date().toISOString() };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'moje-spomienky.json';
    a.click(); URL.revokeObjectURL(url);
    showToast('✅ Dáta exportované!');
  };

  window.handleImport = async function(e) {
    const file = e.target.files[0];
    if (!file) return;
    try {
      const text = await file.text();
      const data = JSON.parse(text);
      const imported = data.memories || data;
      if (!Array.isArray(imported)) throw new Error('Invalid format');
      if (imported.length === 0) { showToast('⚠️ Žiadne spomienky na import.'); return; }
      if (!confirm(`Importovať ${imported.length} spomienok? Súčasné dáta budú nahradené.`)) return;

      // Delete all existing
      for (const m of memories) { await deleteMemoryFromDB(m.id); }

      // Insert imported
      for (const m of imported) {
        const { id, created_at, ...rest } = m; // strip old ids
        await addMemoryToDB(rest);
      }

      memories = await loadMemories();
      if (data.settings) {
        await saveSettingsToDB(data.settings);
        settings = data.settings;
      }

      closeSettings();
      refreshMapMarkers();
      updateStats();
      populateFilterDropdowns();
      if (currentView === 'timeline') renderTimeline();
      showToast('✅ Dáta importované!');
    } catch(err) {
      showToast('⚠️ Neplatný súbor: ' + err.message);
    }
    e.target.value = '';
  };

  window.resetSampleData = async function() {
    const sampleIds = memories.filter(m => m.tags && m.tags.includes('ukážka') || m.name.includes('Bratislava'));
    if (!confirm(`Vymazať všetky spomienky a nahrať ukážkové? Táto akcia je nenávratná.`)) return;

    try {
      for (const m of memories) { await deleteMemoryFromDB(m.id); }
      memories = [];
      for (const s of sampleMemories) {
        const saved = await addMemoryToDB(s);
        memories.push(saved);
      }
      memories = await loadMemories();
      closeSettings();
      refreshMapMarkers();
      updateStats();
      populateFilterDropdowns();
      if (currentView === 'timeline') renderTimeline();
      showToast('✅ Ukážkové dáta obnovené.');
    } catch(err) { showToast('⚠️ Chyba: ' + err.message); }
  };

  // ===== FILTERS =====
  window.applyFilters = function() {
    const query = document.getElementById('searchInput').value.toLowerCase().trim();
    const country = document.getElementById('filterCountry').value;
    const mood = document.getElementById('filterMood').value;
    const tag = document.getElementById('filterTag').value;

    let filtered = [...memories];
    if (query) filtered = filtered.filter(m => m.name.toLowerCase().includes(query) || m.country.toLowerCase().includes(query) || (m.story && m.story.toLowerCase().includes(query)));
    if (country) filtered = filtered.filter(m => m.country === country);
    if (mood) filtered = filtered.filter(m => m.mood === mood);
    if (tag) filtered = filtered.filter(m => m.tags && m.tags.includes(tag));

    const sorted = filtered.sort((a, b) => {
      if (a.favorite && !b.favorite) return -1;
      if (!a.favorite && b.favorite) return 1;
      return new Date(b.date) - new Date(a.date);
    });

    const list = document.getElementById('timelineList');
    const empty = document.getElementById('timelineEmpty');

    if (sorted.length === 0) {
      list.style.display = 'none';
      empty.style.display = 'flex';
      empty.innerHTML = query||country||mood||tag
        ? '<div class="empty-icon">🔍</div><p>Žiadna spomienka nezodpovedá filtru.</p>'
        : '<div class="empty-icon">🗺️</div><p>Zatiaľ tu nie sú žiadne spomienky.<br>Pridajte prvú! 💕</p>';
      return;
    }
    empty.style.display = 'none';
    list.style.display = 'block';

    list.innerHTML = sorted.map((m, i) => {
      const tagsHtml = m.tags && m.tags.length > 0
        ? `<div class="timeline-tags">${m.tags.map(t => `<span class="timeline-tag">${escapeHtml(t)}</span>`).join('')}</div>` : '';
      return `<div class="timeline-item ${m.favorite?'fav':''}" style="animation-delay:${i*.05}s" onclick="openViewModal('${m.id}')">
        <div class="timeline-item-top">
          ${m.mood ? `<div class="timeline-mood">${m.mood}</div>` : ''}
          <div class="timeline-info">
            <div class="timeline-name">${escapeHtml(m.name)} ${m.favorite?'⭐':''}</div>
            <div class="timeline-country">${escapeHtml(m.country)}</div>
            <div class="timeline-date">📅 ${formatDate(m.date)}</div>
          </div>
        </div>
        ${tagsHtml}
        ${m.story ? `<div class="timeline-story">${escapeHtml(m.story)}</div>` : ''}
      </div>`;
    }).join('');
  };

  window.clearFilters = function() {
    document.getElementById('searchInput').value = '';
    document.getElementById('filterCountry').value = '';
    document.getElementById('filterMood').value = '';
    document.getElementById('filterTag').value = '';
    applyFilters();
  };

  function populateFilterDropdowns() {
    const countries = [...new Set(memories.map(m => m.country))].sort();
    const moods = [...new Set(memories.map(m => m.mood).filter(Boolean))];
    const tags = [...new Set(memories.flatMap(m => m.tags || []))].sort();

    const countryEl = document.getElementById('filterCountry');
    countryEl.innerHTML = '<option value="">Krajina</option>' + countries.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('');

    const moodEl = document.getElementById('filterMood');
    moodEl.innerHTML = '<option value="">Nálada</option>' + moods.map(m => `<option value="${m}">${m}</option>`).join('');

    const tagEl = document.getElementById('filterTag');
    tagEl.innerHTML = '<option value="">Štítok</option>' + tags.map(t => `<option value="${escapeHtml(t)}">${escapeHtml(t)}</option>`).join('');
  }

  // ===== LIGHTBOX =====
  window.openLightbox = function(src) {
    lightboxImg.src = src;
    lightbox.classList.add('open');
  };
  window.closeLightbox = function() {
    lightbox.classList.remove('open');
    lightboxImg.src = '';
  };

  // ===== TOAST =====
  let toastTimeout;
  function showToast(msg) {
    toast.innerHTML = msg;
    toast.classList.add('show');
    clearTimeout(toastTimeout);
    toastTimeout = setTimeout(() => toast.classList.remove('show'), 3000);
  }

  // ===== HELPERS =====
  function formatDate(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr + 'T00:00:00');
    if (isNaN(d.getTime())) return dateStr;
    const months = ['januára','februára','marca','apríla','mája','júna','júla','augusta','septembra','októbra','novembra','decembra'];
    return `${d.getDate()}. ${months[d.getMonth()]} ${d.getFullYear()}`;
  }

  function truncateText(text, max) {
    if (!text || text.length <= max) return text || '';
    return text.substring(0, max) + '...';
  }

  function escapeHtml(str) {
    if (!str) return '';
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function formatBytes(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
    return (bytes/(1024*1024)).toFixed(1) + ' MB';
  }

  // ===== KEYBOARD =====
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      if (lightbox.classList.contains('open')) closeLightbox();
      else if (settingsOverlay.classList.contains('open')) closeSettings();
      else if (modalOverlay.classList.contains('open')) closeModal();
    }
  });

  // ===== CREATE HEARTS =====
  function createHearts() {
    const bg = document.getElementById('heartsBg');
    const emojis = ['💕','❤️','🥰','💗','✨','💖','🌸'];
    for (let i = 0; i < 20; i++) {
      const el = document.createElement('div');
      el.className = 'heart-particle';
      el.textContent = emojis[i % emojis.length];
      el.style.left = Math.random() * 100 + '%';
      el.style.fontSize = (14 + Math.random() * 20) + 'px';
      el.style.animationDuration = (6 + Math.random() * 8) + 's';
      el.style.animationDelay = (Math.random() * 10) + 's';
      bg.appendChild(el);
    }
  }
  createHearts();

  // ===== PWA: SERVICE WORKER =====
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }

  // ===== MAIN INIT =====
  async function init() {
    initMap();
    // Wait for app to be visible before map invalidation
    initApp().then(() => {
      updateStats();
      populateFilterDropdowns();
      // Attach hero enter app to run after data loaded
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
